image: docker:27

services:
  - docker:27-dind

variables:
  DOCKER_TLS_CERTDIR: ""
  IMAGE_NAME: jahangiraze/shopery

stages:
  - docker

docker-build-push:
  stage: docker
  script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA .
    - docker push $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
