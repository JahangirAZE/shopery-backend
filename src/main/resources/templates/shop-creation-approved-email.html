<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Shop Approved</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f6f8; padding: 20px;">
<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center">
            <table width="600" style="background-color: #ffffff; padding: 30px; border-radius: 8px;">
                <tr>
                    <td>
                        <h2 style="color: #2ecc71;">🎉 Congratulations, <span th:text="${userName}">User</span>!</h2>

                        <p>
                            Your request to create the shop
                            <strong th:text="${shopName}">Shop Name</strong>
                            has been <strong>approved</strong>.
                        </p>

                        <p>
                            You can now start managing your shop, add products, and receive orders.
                        </p>

                        <p style="margin-top: 30px;">
                            Welcome to <strong>Shopery</strong> and happy selling 🚀
                        </p>

                        <hr style="margin: 30px 0;"/>

                        <p style="font-size: 12px; color: #777;">
                            If you didn’t request this, please contact our support team.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
