<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Shop Rejected</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f6f8; padding: 20px;">
<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center">
            <table width="600" style="background-color: #ffffff; padding: 30px; border-radius: 8px;">
                <tr>
                    <td>
                        <h2 style="color: #e74c3c;">Hello, <span th:text="${userName}">User</span></h2>

                        <p>
                            Unfortunately, your request to create the shop
                            <strong th:text="${shopName}">Shop Name</strong>
                            has been <strong>rejected</strong>.
                        </p>

                        <p>
                            <strong>Reason:</strong>
                        </p>

                        <blockquote style="background-color: #f8d7da; padding: 15px; border-left: 4px solid #e74c3c;">
                            <span th:text="${rejectionReason}">
                                Reason goes here
                            </span>
                        </blockquote>

                        <p>
                            You may review the reason and submit a new request after making the necessary changes.
                        </p>

                        <p style="margin-top: 30px;">
                            If you have questions, feel free to contact our support team.
                        </p>

                        <hr style="margin: 30px 0;"/>

                        <p style="font-size: 12px; color: #777;">
                            Thank you for using <strong>Shopery</strong>.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
